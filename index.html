<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gamepay Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Poppins,sans-serif}

body{
background:linear-gradient(135deg,#081a3a,#0a4fa3);
color:white;
min-height:100vh;
overflow-x:hidden;
}

#particles-js{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

.header{
text-align:center;
margin-bottom:30px;
}

.header h1{
font-size:40px;
color:#ffd93b;
text-shadow:0 0 15px #ffd93b;
}

.header p{
font-size:18px;
color:#bde8ff;
}

.app-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:20px;
margin-top:30px;
}

.app-card{
background:#0d3f85;
border-radius:20px;
padding:25px;
text-align:center;
cursor:pointer;
transition:0.3s;
}

.app-card:hover{
transform:translateY(-6px);
background:#1251aa;
}

.app-card img{
width:60px;
margin-bottom:10px;
}

.game-page{
display:none;
grid-template-columns:1.5fr 1fr;
gap:25px;
margin-top:20px;
}

.panel{
background:#0b2e63;
border-radius:20px;
padding:20px;
}

.game-title{
font-size:30px;
color:#ffd93b;
margin-bottom:10px;
}

.top-bar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:10px;
}

button{
border:none;
border-radius:10px;
padding:10px 16px;
cursor:pointer;
font-weight:bold;
}

.back-btn{background:#12d7ff;color:#04204e}
.admin-btn{background:#ffcc00;color:black}

.preview-box img{
width:100%;
border-radius:10px;
margin-bottom:15px;
}

.item{
display:flex;
justify-content:space-between;
align-items:center;
background:#1251aa;
padding:12px;
border-radius:10px;
margin-bottom:10px;
}

.qty{
display:flex;
align-items:center;
gap:8px;
}

.qty button{
background:#12d7ff;
padding:5px 10px;
}

.cart-title{
font-size:24px;
color:#ffd93b;
margin-bottom:10px;
}

.cart-row{
display:flex;
justify-content:space-between;
padding:6px 0;
}

.total{
margin-top:10px;
font-size:20px;
color:#ffe866;
}

textarea{
width:100%;
margin-top:10px;
border-radius:10px;
padding:10px;
border:none;
}

.telegram-btn{
width:100%;
margin-top:10px;
background:#12d7ff;
color:#04204e;
font-size:18px;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
}

.modal-box{
background:#0b2e63;
padding:20px;
border-radius:20px;
width:600px;
}

.modal textarea{
height:200px;
}

.footer{
text-align:center;
margin-top:30px;
color:#ffd93b;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<div class="container">

<div class="header">
<h1>Gamepay Hub</h1>
<p>Fast Mobile Game Topup</p>
</div>

<div id="gameMenu" class="app-grid"></div>

<div id="gamePage" class="game-page">

<div class="panel">
<div class="top-bar">
<div id="gameTitle" class="game-title"></div>
<div>
<button class="admin-btn" onclick="openEditor()">Edit Stock</button>
<button class="back-btn" onclick="backMenu()">Back</button>
</div>
</div>

<div class="preview-box">
<img id="gameImage">
</div>

<div id="itemsContainer"></div>

</div>

<div class="panel">

<div class="cart-title">Order Cart</div>

<div id="cartList"></div>

<div class="total">Total: <span id="totalPrice">0</span> ks</div>

<textarea id="accountInfo" placeholder="Game ID / Server / Name"></textarea>

<div style="margin-top:10px">
<label><input type="radio" name="pay" value="Kpay">Kpay</label>
<label><input type="radio" name="pay" value="Wave">Wave</label>
<label><input type="radio" name="pay" value="UAB">UAB</label>
<label><input type="radio" name="pay" value="Aya">AyaPay</label>
</div>

<button class="telegram-btn" onclick="sendOrder()">Order via Telegram</button>

</div>

</div>

<div class="footer">Founder: Diameter Eight</div>

</div>

<div id="editorModal" class="modal">
<div class="modal-box">
<h3>Edit Game Data</h3>
<textarea id="editor"></textarea>
<br><br>
<button onclick="saveEditor()">Save</button>
<button onclick="closeEditor()">Cancel</button>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>

particlesJS("particles-js",{
particles:{number:{value:70},size:{value:3},move:{speed:2}}
});

const TELEGRAM="angsthtun";

let currentGame="";
let cart={};

const gameData={
mlbb:{
title:"Mobile Legends",
icon:"https://seeklogo.com/images/M/mobile-legends-logo-7B7E78F41A-seeklogo.com.png",
image:"https://images8.alphacoders.com/136/1364527.jpeg",
items:[
{name:"Weekly Pass",price:5700},
{name:"50 Diamonds",price:3100},
{name:"150 Diamonds",price:9000}
]
}
};

const menu=document.getElementById("gameMenu");

function renderMenu(){
menu.innerHTML="";
for(let key in gameData){
const g=gameData[key];

menu.innerHTML+=`
<div class="app-card" onclick="openGame('${key}')">
<img src="${g.icon}">
<div>${g.title}</div>
</div>`;
}
}

function openGame(k){
currentGame=k;
document.getElementById("gameMenu").style.display="none";
document.getElementById("gamePage").style.display="grid";

const g=gameData[k];

document.getElementById("gameTitle").textContent=g.title;
document.getElementById("gameImage").src=g.image;

renderItems();
}

function backMenu(){
document.getElementById("gameMenu").style.display="grid";
document.getElementById("gamePage").style.display="none";
cart={};
updateCart();
}

function renderItems(){
const container=document.getElementById("itemsContainer");
container.innerHTML="";

gameData[currentGame].items.forEach((item,i)=>{

container.innerHTML+=`
<div class="item">
<span>${item.name}</span>
<div class="qty">
<button onclick="changeQty(${i},-1)">-</button>
<span id="qty${i}">0</span>
<button onclick="changeQty(${i},1)">+</button>
</div>
<span>${item.price}</span>
</div>`;

});
}

function changeQty(i,val){
cart[i]=(cart[i]||0)+val;
if(cart[i]<0)cart[i]=0;
document.getElementById("qty"+i).textContent=cart[i];
updateCart();
}

function updateCart(){
let html="";
let total=0;

Object.keys(cart).forEach(i=>{
const qty=cart[i];
if(qty>0){
const item=gameData[currentGame].items[i];
const price=item.price*qty;
total+=price;

html+=`<div class="cart-row">
<span>${item.name} x${qty}</span>
<span>${price}</span>
</div>`;
}
});

document.getElementById("cartList").innerHTML=html||"No items";
document.getElementById("totalPrice").textContent=total;
}

function sendOrder(){

let msg="Gamepay Hub Order\n\n";
msg+="Game: "+gameData[currentGame].title+"\n";

Object.keys(cart).forEach(i=>{
const q=cart[i];
if(q>0){
const item=gameData[currentGame].items[i];
msg+=item.name+" x"+q+"\n";
}
});

msg+="\nAccount:\n"+document.getElementById("accountInfo").value;

window.open("https://t.me/"+TELEGRAM+"?text="+encodeURIComponent(msg));
}

function openEditor(){

const pass=prompt("Enter admin password");

if(pass!=="aungshin12345xx"){
alert("Access denied");
return;
}

document.getElementById("editor").value=JSON.stringify(gameData[currentGame],null,2);
document.getElementById("editorModal").style.display="flex";
}

function closeEditor(){
document.getElementById("editorModal").style.display="none";
}

function saveEditor(){
try{
const data=JSON.parse(document.getElementById("editor").value);
gameData[currentGame]=data;
renderItems();
closeEditor();
alert("Updated");
}catch{
alert("JSON Error");
}
}

renderMenu();

</script>

</body>
</html>
